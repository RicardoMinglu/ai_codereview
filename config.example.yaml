# 仅需保留：服务、AI、MySQL。GitHub Token / Webhook 密钥 / 评审与通知均在 Web「项目配置」写入表 github_projects，
# 或通过 SQL 写入；下述 github、review、notify 段若仍存在会被解析但运行时不再使用（可整段删除）。

server:
  port: 8078
  base_url: "http://localhost:8078"

ai:
  provider: "claude"
  claude:
    api_key: "sk-ant-xxxxxxxxxxxxxxxxxxxx"
    model: "claude-sonnet-4-6"
  openai:
    api_key: "sk-xxxxxxxxxxxxxxxxxxxx"
    model: "gpt-4o"
  gemini:
    api_key: "AIzaSyxxxxxxxxxxxxxxxxxxxxxxxx"
    model: "gemini-2.5-flash"

storage:
  type: "mysql"
  dsn: "user:pass@tcp(127.0.0.1:3306)/ai_review?charset=utf8mb4"
  # 启动后若表为空，日志与首页会提示打开 /admin/projects 或 /setup。
  # notify_json / review_json 结构见历史文档或管理页示例；默认评审基数由内建 DefaultReviewConfig 提供，review_json 只覆盖所写字段。
